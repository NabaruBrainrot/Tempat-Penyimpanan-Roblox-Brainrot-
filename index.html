<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Download — by FaDhen</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #03050f;
      --surface: #080c1a;
      --surface2: #0d1228;
      --border: rgba(99,120,255,0.15);
      --accent: #6378ff;
      --accent2: #a855f7;
      --accent3: #22d3ee;
      --text: #eef0ff;
      --muted: #4a5080;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* AURORA */
    .aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .aurora-blob {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.16;
      animation: drift ease-in-out infinite alternate;
    }
    .aurora-blob:nth-child(1) { width:620px;height:620px;background:radial-gradient(circle,#6378ff,transparent 70%);top:-220px;left:-120px;animation-duration:13s; }
    .aurora-blob:nth-child(2) { width:520px;height:520px;background:radial-gradient(circle,#a855f7,transparent 70%);bottom:-160px;right:-120px;animation-duration:16s;animation-delay:-6s; }
    .aurora-blob:nth-child(3) { width:360px;height:360px;background:radial-gradient(circle,#22d3ee,transparent 70%);top:38%;left:48%;animation-duration:11s;animation-delay:-9s;opacity:0.09; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.1); }
    }

    /* DOT GRID */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(99,120,255,0.11) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* HEADER */
    header {
      position: fixed; top:0;left:0;right:0; z-index:50;
      padding: 18px 32px;
      display: flex; justify-content:space-between; align-items:center;
      background: linear-gradient(to bottom, rgba(3,5,15,0.92) 60%, transparent);
      backdrop-filter: blur(3px);
    }
    .by-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; font-weight:500; color:var(--muted); letter-spacing:0.08em;
    }
    .by-label span { color:var(--accent); font-weight:700; }
    .ver-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem; font-weight:700; letter-spacing:0.18em;
      color:var(--accent2); border:1px solid rgba(168,85,247,0.25);
      background:rgba(168,85,247,0.07); padding:5px 12px; border-radius:100px;
    }

    /* WRAP */
    .wrap {
      position:relative; z-index:10; min-height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:100px 20px 80px;
    }

    /* HERO */
    .hero {
      display:flex; flex-direction:column; align-items:center;
      text-align:center; gap:16px; margin-bottom:38px;
      animation: riseIn 0.9s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes riseIn {
      from { opacity:0; transform:translateY(36px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .eyebrow {
      display:inline-flex; align-items:center; gap:8px;
      font-family:'JetBrains Mono',monospace; font-size:0.68rem;
      letter-spacing:0.25em; text-transform:uppercase; color:var(--accent3);
      background:rgba(34,211,238,0.07); border:1px solid rgba(34,211,238,0.2);
      padding:6px 14px; border-radius:100px;
    }
    .eyebrow::before {
      content:''; width:6px;height:6px; border-radius:50%;
      background:var(--accent3); box-shadow:0 0 8px var(--accent3);
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100%{opacity:1;transform:scale(1);}
      50%{opacity:0.4;transform:scale(0.65);}
    }

    h1 {
      font-family:'Outfit',sans-serif; font-weight:900;
      font-size:clamp(2.5rem,9vw,4.8rem); line-height:1.0; letter-spacing:-0.03em;
      background:linear-gradient(155deg,#ffffff 25%,#a0aaff 65%,#a855f7 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    .subtitle {
      font-size:clamp(0.8rem,2.5vw,0.92rem); color:var(--muted);
      line-height:1.75; max-width:380px; font-weight:400;
    }

    /* CARD */
    .card {
      width:100%; max-width:456px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:24px; padding:30px 30px 26px;
      display:flex; flex-direction:column; gap:20px;
      position:relative; overflow:hidden;
      box-shadow: 0 0 0 1px rgba(99,120,255,0.04), 0 24px 70px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: riseIn 0.9s 0.14s cubic-bezier(.16,1,.3,1) both;
    }
    .card::before {
      content:''; position:absolute; top:0; left:8%;right:8%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(99,120,255,0.55),rgba(168,85,247,0.55),transparent);
    }

    /* FILE ROW */
    .file-row {
      display:flex; align-items:center; gap:13px;
      background:var(--surface2); border:1px solid rgba(255,255,255,0.04);
      border-radius:14px; padding:13px 15px;
    }
    .file-icon-wrap {
      width:42px;height:42px; flex-shrink:0; border-radius:10px;
      background:linear-gradient(135deg,rgba(99,120,255,0.2),rgba(168,85,247,0.15));
      border:1px solid rgba(99,120,255,0.2);
      display:flex;align-items:center;justify-content:center;
      font-size:1.25rem; position:relative; overflow:hidden;
    }
    .file-icon-wrap::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.16) 0%,transparent 60%);
    }
    .file-details { flex:1; min-width:0; }
    .file-name { font-weight:700; font-size:0.86rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .file-meta-row { display:flex; gap:6px; margin-top:4px; flex-wrap:wrap; }
    .chip {
      font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--muted);
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06);
      padding:2px 8px; border-radius:100px; letter-spacing:0.05em;
    }
    .chip.ok { color:#4ade80; border-color:rgba(74,222,128,0.2); background:rgba(74,222,128,0.06); }

    /* ── DOWNLOAD BUTTON ── */
    .btn-download {
      position:relative; display:block; text-decoration:none;
      border:none; cursor:pointer; border-radius:16px; overflow:hidden;
      background:linear-gradient(140deg, #4f5fff 0%, #7c3aed 55%, #6060f8 100%);
      box-shadow: 0 4px 22px rgba(99,120,255,0.38), 0 1px 0 rgba(255,255,255,0.16) inset, 0 -1px 0 rgba(0,0,0,0.28) inset;
      transition: transform 0.22s cubic-bezier(.16,1,.3,1), box-shadow 0.28s;
      min-height:58px;
    }

    /* Sweep shine */
    .btn-download::before {
      content:''; position:absolute;
      top:-10%; left:-80%; width:55%; height:120%;
      background:linear-gradient(108deg,transparent 0%,rgba(255,255,255,0.07) 28%,rgba(255,255,255,0.38) 50%,rgba(255,255,255,0.07) 72%,transparent 100%);
      transform:skewX(-14deg);
      animation:shineSweep 2.8s ease-in-out infinite;
    }
    @keyframes shineSweep {
      0%   { left:-80%; opacity:0; }
      8%   { opacity:1; }
      50%  { left:120%; opacity:1; }
      52%  { opacity:0; }
      100% { left:120%; opacity:0; }
    }

    /* Top gloss */
    .btn-download::after {
      content:''; position:absolute; top:0;left:0;right:0; height:46%;
      background:linear-gradient(to bottom,rgba(255,255,255,0.17),transparent);
      border-radius:16px 16px 0 0; pointer-events:none;
    }

    .btn-inner {
      position:relative; z-index:2;
      display:flex; align-items:center; justify-content:center; gap:10px;
      font-family:'Outfit',sans-serif; font-weight:800; font-size:1rem;
      letter-spacing:0.05em; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.35);
      padding:0 28px; height:58px; width:100%;
    }

    .dl-icon svg { width:20px;height:20px; transition:transform 0.3s cubic-bezier(.16,1,.3,1); filter:drop-shadow(0 0 6px rgba(255,255,255,0.35)); }

    .btn-download:hover { transform:translateY(-3px) scale(1.015); box-shadow:0 14px 44px rgba(99,120,255,0.58), 0 4px 14px rgba(168,85,247,0.28), 0 1px 0 rgba(255,255,255,0.2) inset; }
    .btn-download:hover .dl-icon svg { transform:translateY(3px); }
    .btn-download:active { transform:translateY(0) scale(0.98); }

    /* Ripple */
    .ripple {
      position:absolute; border-radius:50%; background:rgba(255,255,255,0.28);
      transform:scale(0); animation:rpl 0.7s ease-out forwards; pointer-events:none; z-index:3;
    }
    @keyframes rpl { to { transform:scale(5); opacity:0; } }

    /* DIVIDER */
    .divider { display:flex; align-items:center; gap:12px; }
    .divider-line { flex:1; height:1px; background:rgba(255,255,255,0.04); }
    .divider-text { font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--muted); letter-spacing:0.12em; }

    /* STATS */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); }
    .stat { text-align:center; padding:4px 0; position:relative; }
    .stat+.stat::before { content:''; position:absolute; left:0;top:12%;bottom:12%; width:1px; background:rgba(255,255,255,0.05); }
    .stat-num {
      font-family:'Outfit',sans-serif; font-weight:800; font-size:1.2rem; line-height:1.2;
      background:linear-gradient(135deg,#a0aaff,#c084fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .stat-label { font-family:'JetBrains Mono',monospace; font-size:0.56rem; color:var(--muted); margin-top:2px; letter-spacing:0.1em; text-transform:uppercase; }

    /* PARTICLES */
    .particles { position:fixed;inset:0;pointer-events:none;z-index:1; }
    .p { position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0; }
    @keyframes floatUp {
      0%{opacity:0;transform:translateY(0) scale(.5);}
      10%{opacity:.7;}
      90%{opacity:.25;}
      100%{opacity:0;transform:translateY(-100vh) scale(1.2);}
    }

    /* FOOTER */
    footer {
      position:fixed;bottom:0;left:0;right:0; text-align:center;
      padding:16px; font-family:'JetBrains Mono',monospace;
      font-size:0.6rem; color:var(--muted); letter-spacing:0.12em;
      background:linear-gradient(to top,rgba(3,5,15,0.95) 60%,transparent); z-index:50;
    }
    footer em { color:var(--accent); font-style:normal; font-weight:700; }

    /* TOAST */
    .toast {
      position:fixed; bottom:56px;left:50%;
      transform:translateX(-50%) translateY(14px);
      background:var(--surface2); border:1px solid rgba(99,120,255,0.28); color:var(--text);
      font-size:0.76rem; padding:11px 20px; border-radius:100px;
      opacity:0; pointer-events:none;
      transition:all 0.4s cubic-bezier(.16,1,.3,1);
      white-space:nowrap; z-index:200; letter-spacing:0.06em;
      box-shadow:0 8px 30px rgba(0,0,0,0.5);
      display:flex;align-items:center;gap:8px;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast-dot { width:7px;height:7px;border-radius:50%;background:var(--accent3);box-shadow:0 0 8px var(--accent3);flex-shrink:0; }

    /* MOBILE */
    @media(max-width:480px){
      header{padding:13px 17px;}
      .by-label{font-size:0.62rem;}
      .ver-pill{font-size:0.55rem;padding:4px 10px;}
      .wrap{padding:82px 13px 68px;}
      h1{font-size:clamp(1.95rem,11vw,2.7rem);}
      .subtitle{font-size:0.76rem;}
      .hero{margin-bottom:24px;gap:13px;}
      .card{padding:20px 16px 18px;border-radius:18px;gap:15px;max-width:100%;}
      .file-row{padding:11px 12px;}
      .file-icon-wrap{width:38px;height:38px;font-size:1.1rem;}
      .file-name{font-size:0.78rem;}
      .btn-inner{font-size:0.88rem;height:52px;}
      .btn-download{min-height:52px;border-radius:13px;}
      .btn-download::after{border-radius:13px 13px 0 0;}
      .stat-num{font-size:1.05rem;}
      .toast{font-size:0.66rem;max-width:86vw;padding:9px 15px;bottom:62px;}
      footer{font-size:0.56rem;padding:13px;}
      .p{display:none;}
    }
    @media(min-width:481px) and (max-width:700px){
      .wrap{padding:90px 17px 70px;}
      .card{max-width:100%;}
    }
  </style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>
<div class="grid-bg"></div>
<div class="particles" id="particles"></div>

<header>
  <div class="by-label">crafted by <span>FaDhen</span></div>
  <div class="ver-pill">v2.0 RELEASE</div>
</header>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Official Release</div>
    <h1>Download<br/>Sekarang</h1>
    <p class="subtitle">Gratis, cepat, dan siap digunakan kapan saja. Klik tombol di bawah untuk mulai.</p>
  </div>

  <div class="card">
    <div class="file-row">
      <div class="file-icon-wrap">📦</div>
      <div class="file-details">
        <div class="file-name">FaDhen-v2.0.zip</div>
        <div class="file-meta-row">
          <span class="chip">42.8 MB</span>
          <span class="chip">ZIP</span>
          <span class="chip ok">✓ Verified</span>
        </div>
      </div>
    </div>

    <a
      class="btn-download"
      href="https://www.mediafire.com/file/pswq2gs5ecyr802/JJSploit_64Bits-2.711.876.apk/file"
      target="_blank"
      rel="noopener noreferrer"
      id="dlBtn"
    >
      <div class="btn-inner">
        <div class="dl-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v13M6 11l6 6 6-6"/><path d="M3 20h18"/>
          </svg>
        </div>
        DOWNLOAD GRATIS
      </div>
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">STATS</div>
      <div class="divider-line"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num">10K+</div>
        <div class="stat-label">Downloads</div>
      </div>
      <div class="stat">
        <div class="stat-num">4.9★</div>
        <div class="stat-label">Rating</div>
      </div>
      <div class="stat">
        <div class="stat-num">Free</div>
        <div class="stat-label">Forever</div>
      </div>
    </div>
  </div>
</div>

<footer>Made with ❤️ by <em>FaDhen</em></footer>
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span>Download dimulai...</span>
</div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  const cnt = window.innerWidth < 481 ? 0 : window.innerWidth < 768 ? 10 : 22;
  ['#6378ff','#a855f7','#22d3ee'].forEach((c, ci) => {
    for (let i = 0; i < Math.ceil(cnt/3); i++) {
      const p = document.createElement('div');
      p.className = 'p';
      const s = Math.random()*3+1;
      p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};animation-duration:${Math.random()*16+10}s;animation-delay:${Math.random()*12}s;`;
      pc.appendChild(p);
    }
  });

  // Click handler
  const btn = document.getElementById('dlBtn');
  const toast = document.getElementById('toast');
  btn.addEventListener('click', function(e) {
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 800);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  });
</script>
</body>
</html>
